name: Desktop Build (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment name"
        required: true
        type: string
      cloud_url:
        description: "NEXU_CLOUD_URL value"
        required: true
        type: string
      link_url:
        description: "NEXU_LINK_URL value (use 'null' for no link)"
        required: false
        type: string
        default: "null"
      sentry_env:
        description: "NEXU_SENTRY_ENV value (test, prod)"
        required: true
        type: string
      release_tag:
        description: "GitHub release tag name"
        required: true
        type: string
      release_name:
        description: "GitHub release display name"
        required: true
        type: string
      update_feed_url:
        description: "NEXU_UPDATE_FEED_URL for auto-update (R2 path)"
        required: false
        type: string
        default: ""
      channel:
        description: "Release channel (stable, beta, nightly)"
        required: true
        type: string
      build_source:
        description: "Build source label embedded in desktop metadata"
        required: true
        type: string
      require_spctl:
        description: "Run Gatekeeper spctl assessment against packaged and extracted runner apps"
        required: false
        type: boolean
        default: true
    secrets:
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_PURGE_API_TOKEN:
        required: false
      LANGFUSE_PUBLIC_KEY:
        required: false
      LANGFUSE_SECRET_KEY:
        required: false
      LANGFUSE_BASE_URL:
        required: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate channel input
        shell: bash
        run: |
          case "${{ inputs.channel }}" in
            stable|beta|nightly) ;;
            *) echo "Invalid channel: ${{ inputs.channel }}" >&2; exit 1 ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore npm cache for runtime installs
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: desktop-npm-cache-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('packages/slimclaw/runtime-seed/package-lock.json', 'apps/controller/static/runtime-plugins/openclaw-weixin/package-lock.json') }}
          restore-keys: |
            desktop-npm-cache-${{ runner.os }}-${{ matrix.arch }}-
            desktop-npm-cache-${{ runner.os }}-

      - name: Restore Electron build caches
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            apps/desktop/.cache
          key: desktop-electron-cache-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('pnpm-lock.yaml', 'apps/desktop/package.json') }}
          restore-keys: |
            desktop-electron-cache-${{ runner.os }}-${{ matrix.arch }}-
            desktop-electron-cache-${{ runner.os }}-

      - name: Resolve build metadata
        id: meta
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          base_version=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("apps/desktop/package.json", "utf8")); process.stdout.write(pkg.version);')
          build_date=$(date +"%Y%m%d")
          short_sha="${GITHUB_SHA::7}"
          channel="${{ inputs.channel }}"

          # For non-stable channels, inject date suffix into version for auto-update
          # e.g. 0.1.1 → 0.1.1-nightly.20260319 (only in build artifact, not committed to git)
          if [ "$channel" != "stable" ]; then
            desktop_version="${base_version}-${channel}.${build_date}"
            node -e "
              const fs = require('node:fs');
              const path = 'apps/desktop/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '${desktop_version}';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "[meta] Patched version: ${base_version} → ${desktop_version}"
          else
            desktop_version="$base_version"
          fi

          {
            echo "desktop_version=$desktop_version"
            echo "build_date=$build_date"
            echo "short_sha=$short_sha"
            echo "channel=$channel"
            echo "artifact_name=desktop-${channel}-${ARCH}-${build_date}-${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Apple signing certificate
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_SIGNING_CERTIFICATE_BASE64" ] || [ -z "$APPLE_SIGNING_CERTIFICATE_PASSWORD" ]; then
            echo "Missing Apple signing certificate secrets" >&2
            exit 1
          fi

          cert_path="$RUNNER_TEMP/nexu-desktop-signing.p12"
          if ! printf '%s' "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$cert_path" 2>/dev/null; then
            printf '%s' "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 -D > "$cert_path"
          fi

          {
            echo "CSC_LINK=$cert_path"
            echo "CSC_KEY_PASSWORD=$APPLE_SIGNING_CERTIFICATE_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate build config
        shell: bash
        env:
          CLOUD_URL: ${{ inputs.cloud_url }}
          LINK_URL: ${{ inputs.link_url }}
          SENTRY_ENV: ${{ inputs.sentry_env }}
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          BUILD_SOURCE: ${{ inputs.build_source }}
          BUILD_BRANCH: ${{ github.ref_name }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_ARCH: ${{ matrix.arch }}
          SENTRY_DSN_TEST: ${{ secrets.SENTRY_DSN_NEXU_DESKTOP_TEST }}
          SENTRY_DSN_PROD: ${{ secrets.SENTRY_DSN_NEXU_DESKTOP_PROD }}
        run: |
          export BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node -e '
            const { version } = require("./apps/desktop/package.json");
            const sentryDsnByEnvironment = {
              test: process.env.SENTRY_DSN_TEST,
              prod: process.env.SENTRY_DSN_PROD,
            };
            const sentryDsn = sentryDsnByEnvironment[process.env.SENTRY_ENV] ?? "";
            const config = {
              NEXU_CLOUD_URL: process.env.CLOUD_URL,
              NEXU_LINK_URL: process.env.LINK_URL === "null" ? null : process.env.LINK_URL,
              NEXU_SENTRY_ENV: process.env.SENTRY_ENV,
              NEXU_DESKTOP_APP_VERSION: version,
              NEXU_DESKTOP_UPDATE_CHANNEL: "${{ inputs.channel }}",
              NEXU_DESKTOP_BUILD_SOURCE: process.env.BUILD_SOURCE,
              NEXU_DESKTOP_BUILD_BRANCH: process.env.BUILD_BRANCH,
              NEXU_DESKTOP_BUILD_COMMIT: process.env.BUILD_COMMIT,
              NEXU_DESKTOP_BUILD_TIME: process.env.BUILT_AT,
            };
            if (process.env.UPDATE_FEED_URL) {
              config.NEXU_UPDATE_FEED_URL = `${process.env.UPDATE_FEED_URL.replace(/\/$/, "")}/${process.env.BUILD_ARCH}`;
            }
            if (sentryDsn) {
              config.NEXU_DESKTOP_SENTRY_DSN = sentryDsn;
            }
            require("fs").writeFileSync(
              "apps/desktop/build-config.json",
              JSON.stringify(config, null, 2) + "\n"
            );
          '

          echo "[build] Generated build-config.json for ${{ inputs.environment }} environment:"
          cat apps/desktop/build-config.json

      - name: Build signed desktop app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NEXU_DESKTOP_TARGET_ARCH: ${{ matrix.arch }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: pnpm --filter @nexu/desktop dist:mac

      - name: Set packaged app paths
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          runner_home="$HOME"
          packaged_home="$RUNNER_TEMP/desktop-home"
          packaged_user_data_dir="$packaged_home/Library/Application Support/@nexu/desktop"
          packaged_logs_dir="$packaged_user_data_dir/logs"
          packaged_runtime_logs_dir="$packaged_logs_dir/runtime-units"
          default_user_data_dir="$runner_home/Library/Application Support/@nexu/desktop"
          default_logs_dir="$default_user_data_dir/logs"
          default_runtime_logs_dir="$default_logs_dir/runtime-units"
          packaged_apps=(apps/desktop/release/mac*/Nexu.app)

          if [ "${#packaged_apps[@]}" -eq 0 ]; then
            echo "No packaged app bundle found under apps/desktop/release/mac*" >&2
            exit 1
          fi

          packaged_app="${packaged_apps[0]}"
          packaged_executable="$packaged_app/Contents/MacOS/Nexu"

          mkdir -p "$RUNNER_TEMP/desktop-ci" "$packaged_home" "$RUNNER_TEMP/desktop-tmp"

          {
            echo "PACKAGED_HOME=$packaged_home"
            echo "PACKAGED_LOGS_DIR=$packaged_logs_dir"
            echo "PACKAGED_USER_DATA_DIR=$packaged_user_data_dir"
            echo "PACKAGED_RUNTIME_LOGS_DIR=$packaged_runtime_logs_dir"
            echo "DEFAULT_LOGS_DIR=$default_logs_dir"
            echo "DEFAULT_USER_DATA_DIR=$default_user_data_dir"
            echo "DEFAULT_RUNTIME_LOGS_DIR=$default_runtime_logs_dir"
            echo "PACKAGED_APP=$packaged_app"
            echo "PACKAGED_EXECUTABLE=$packaged_executable"
          } >> "$GITHUB_ENV"

      - name: Verify packaged runtime unit health
        env:
          NEXU_DESKTOP_CHECK_CAPTURE_DIR: ${{ runner.temp }}/desktop-ci
          NEXU_DESKTOP_CHECK_TMPDIR: ${{ runner.temp }}/desktop-tmp
        run: pnpm check:dist

      - name: Verify extracted runner bundle integrity
        env:
          NEXU_DESKTOP_CHECK_TMPDIR: ${{ runner.temp }}/desktop-tmp
          NEXU_DESKTOP_REQUIRE_SPCTL: ${{ inputs.require_spctl && '1' || '0' }}
        run: bash scripts/desktop-verify-extracted-runner.sh

      - name: Prepare artifacts
        id: artifacts
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ steps.meta.outputs.desktop_version }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p apps/desktop/channel-artifacts
          rm -f apps/desktop/channel-artifacts/*

          dmg_files=(apps/desktop/release/*.dmg)
          zip_files=(apps/desktop/release/*.zip)

          if [ "${#dmg_files[@]}" -eq 0 ] || [ "${#zip_files[@]}" -eq 0 ]; then
            echo "Expected both dmg and zip artifacts in apps/desktop/release" >&2
            exit 1
          fi

          artifact_version="$VERSION"
          if [ "$CHANNEL" != "stable" ]; then
            artifact_version="${VERSION}.${SHORT_SHA}"
          fi

          latest_name_prefix="nexu-latest-mac-${ARCH}"
          if [ "$CHANNEL" != "stable" ]; then
            latest_name_prefix="nexu-latest-${CHANNEL}-mac-${ARCH}"
          fi

          versioned_dmg="nexu-${artifact_version}-mac-${ARCH}.dmg"
          versioned_zip="nexu-${artifact_version}-mac-${ARCH}.zip"
          latest_dmg="${latest_name_prefix}.dmg"
          latest_zip="${latest_name_prefix}.zip"
          checksum_file="desktop-${ARCH}-sha256.txt"

          cp "${dmg_files[0]}" "apps/desktop/channel-artifacts/${versioned_dmg}"
          cp "${zip_files[0]}" "apps/desktop/channel-artifacts/${versioned_zip}"
          cp "${dmg_files[0]}" "apps/desktop/channel-artifacts/${latest_dmg}"
          cp "${zip_files[0]}" "apps/desktop/channel-artifacts/${latest_zip}"

          shasum -a 256 \
            "apps/desktop/channel-artifacts/${versioned_dmg}" \
            "apps/desktop/channel-artifacts/${versioned_zip}" \
            > "apps/desktop/channel-artifacts/${checksum_file}"

          {
            echo "versioned_dmg=$versioned_dmg"
            echo "versioned_zip=$versioned_zip"
            echo "latest_dmg=$latest_dmg"
            echo "latest_zip=$latest_zip"
            echo "checksum_file=$checksum_file"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_dmg }}
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_zip }}
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.checksum_file }}
          retention-days: 7
          if-no-files-found: error

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.release_name }}
          prerelease: true
          draft: false
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Automated desktop build.

            - Version: `${{ steps.meta.outputs.desktop_version }}`
            - Channel: `${{ inputs.channel }}`
            - Environment: `${{ inputs.environment }}`
            - Commit: `${{ github.sha }}`
            - Built: `${{ steps.meta.outputs.build_date }}`

            The packaged `Nexu.app` bundle is notarized and stapled.

            This build is intended for testing and may be unstable.
          files: |
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_dmg }}
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_zip }}
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.checksum_file }}

      - name: Patch latest-mac.yml for channel naming
        if: inputs.update_feed_url != ''
        env:
          VERSION: ${{ steps.meta.outputs.desktop_version }}
          CHANNEL: ${{ inputs.channel }}
          ARCH: ${{ matrix.arch }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "apps/desktop/release/latest-mac.yml" ]; then
            echo "latest-mac.yml not found, skipping patch"
            exit 0
          fi

          # electron-builder generates filenames without the final public naming format.
          # Original: nexu-0.1.3-nightly.20260325-arm64.dmg
          # Target:   nexu-0.1.3-nightly.20260325.ab12cd3-mac-arm64.dmg
          original_dmg="nexu-${VERSION}-${ARCH}.dmg"
          original_zip="nexu-${VERSION}-${ARCH}.zip"

          echo "Patching latest-mac.yml:"
          echo "  ${original_dmg} → ${VERSIONED_DMG}"
          echo "  ${original_zip} → ${VERSIONED_ZIP}"

          sed -i.bak \
            -e "s|${original_dmg}|${VERSIONED_DMG}|g" \
            -e "s|${original_zip}|${VERSIONED_ZIP}|g" \
            apps/desktop/release/latest-mac.yml

          echo "Patched latest-mac.yml:"
          cat apps/desktop/release/latest-mac.yml

      - name: Upload to Cloudflare R2
        if: inputs.update_feed_url != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_REGION: auto
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          CHANNEL: ${{ inputs.channel }}
          ARCH: ${{ matrix.arch }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
        shell: bash
        run: |
          set -euo pipefail

          R2_BUCKET="s3://nexu-desktop-releases"

          upload_file() {
            local src="$1" dst="$2"
            echo "Uploading $(basename "$src") → ${dst}"
            aws s3 cp "$src" "${R2_BUCKET}/${dst}" --no-progress
          }

          upload_prefix() {
            local prefix="$1"

            echo "[r2] uploading to prefix: ${prefix}/"

            if [ -f "apps/desktop/release/latest-mac.yml" ]; then
              upload_file "apps/desktop/release/latest-mac.yml" "${prefix}/latest-mac.yml"
            fi

            upload_file "apps/desktop/channel-artifacts/${VERSIONED_DMG}" "${prefix}/${VERSIONED_DMG}"
            upload_file "apps/desktop/channel-artifacts/${VERSIONED_ZIP}" "${prefix}/${VERSIONED_ZIP}"
            upload_file "apps/desktop/channel-artifacts/${LATEST_DMG}" "${prefix}/${LATEST_DMG}"
            upload_file "apps/desktop/channel-artifacts/${LATEST_ZIP}" "${prefix}/${LATEST_ZIP}"
            upload_file "apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.checksum_file }}" "${prefix}/${{ steps.artifacts.outputs.checksum_file }}"
          }

          # Extract R2 prefix from feed URL path (e.g. https://desktop-releases.nexu.io/nightly → nightly)
          channel_prefix=$(node -e 'const path = new URL(process.env.UPDATE_FEED_URL).pathname.replace(/^\//, "").replace(/\/$/, ""); process.stdout.write(path);')
          r2_prefix="${channel_prefix}/${ARCH}"

          upload_prefix "$r2_prefix"

          if [ "${ARCH}" = "arm64" ]; then
            echo "[r2] uploading legacy arm64 compatibility feed to prefix: ${channel_prefix}/"
            upload_prefix "$channel_prefix"
          fi

      - name: Purge Cloudflare CDN cache for latest artifacts
        if: inputs.update_feed_url != '' && env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_PURGE_API_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_API_TOKEN }}
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
          ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          set -euo pipefail

          base_url="${UPDATE_FEED_URL%/}/${ARCH}"
          urls=(
            "${base_url}/${LATEST_DMG}"
            "${base_url}/${LATEST_ZIP}"
            "${base_url}/latest-mac.yml"
          )

          if [ "${ARCH}" = "arm64" ]; then
            legacy_base_url="${UPDATE_FEED_URL%/}"
            urls+=(
              "${legacy_base_url}/${LATEST_DMG}"
              "${legacy_base_url}/${LATEST_ZIP}"
              "${legacy_base_url}/latest-mac.yml"
            )
          fi

          files_json=$(printf '%s\n' "${urls[@]}" | jq -R . | jq -sc '.')
          payload=$(jq -cn --argjson files "$files_json" '{ files: $files }')
          api_url="https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache"
          max_attempts=5
          purge_succeeded=0

          echo "[cf-purge] Purging: ${files_json}"

          for attempt in $(seq 1 "$max_attempts"); do
            response_file=$(mktemp)
            http_code="$({
              curl \
                --http1.1 \
                --silent \
                --show-error \
                --location \
                --retry 3 \
                --retry-delay 2 \
                --retry-all-errors \
                --connect-timeout 15 \
                --max-time 120 \
                --output "$response_file" \
                --write-out '%{http_code}' \
                -X POST \
                "$api_url" \
                -H "Authorization: Bearer ${CLOUDFLARE_PURGE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload"
            } || true)"

            echo "[cf-purge] attempt ${attempt}/${max_attempts} http=${http_code:-curl-failed}"

            if [ -s "$response_file" ]; then
              jq . "$response_file" || true
            else
              echo "[cf-purge] empty response body"
            fi

            if [ "$http_code" = "200" ] && jq -e '.success == true' "$response_file" >/dev/null 2>&1; then
              purge_succeeded=1
              rm -f "$response_file"
              break
            fi

            rm -f "$response_file"

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep $((attempt * 2))
            fi
          done

          if [ "$purge_succeeded" -ne 1 ]; then
            echo "[cf-purge] failed after ${max_attempts} attempts" >&2
            exit 1
          fi

      - name: Publish Cloudflare download links
        if: inputs.update_feed_url != ''
        env:
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
          ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          set -euo pipefail

          base_url="${UPDATE_FEED_URL%/}/${ARCH}"
          latest_yml_url="${base_url}/latest-mac.yml"
          versioned_dmg_url="${base_url}/${VERSIONED_DMG}"
          versioned_zip_url="${base_url}/${VERSIONED_ZIP}"
          latest_dmg_url="${base_url}/${LATEST_DMG}"
          latest_zip_url="${base_url}/${LATEST_ZIP}"

          {
            echo "## Cloudflare Downloads"
            echo
            echo "### Versioned"
            echo "- DMG: ${versioned_dmg_url}"
            echo "- ZIP: ${versioned_zip_url}"
            echo
            echo "### Latest (always current)"
            echo "- DMG: ${latest_dmg_url}"
            echo "- ZIP: ${latest_zip_url}"
            echo
            echo "- Update feed: ${latest_yml_url}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Cloudflare Versioned DMG: ${versioned_dmg_url}"
          echo "Cloudflare Latest DMG: ${latest_dmg_url}"
          echo "Cloudflare update feed: ${latest_yml_url}"

  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PREFIX: desktop-${{ inputs.channel }}
        run: |
          set -euo pipefail

          cutoff_date=$(date -d "14 days ago" +%Y-%m-%d)

          gh api "repos/$REPO/actions/artifacts" --paginate | \
            jq -r '.artifacts[] | select(.name | startswith("'"$PREFIX"'")) | select(.created_at < "'"$cutoff_date"'") | .id' | \
            while read -r artifact_id; do
              if [ -n "$artifact_id" ]; then
                gh api "repos/$REPO/actions/artifacts/$artifact_id" -X DELETE
              fi
            done
